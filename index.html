<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One UI 8.5 Quick Panel</title>
    <style>
        :root {
            --panel-bg: rgba(255, 255, 255, 0.75);
            --icon-active: #1a73e8;
            --icon-inactive: #e0e0e0;
            --text-color: #000000;
            --blur: 25px;
        }

        body {
            margin: 0;
            padding: 0;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1000') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* The Quick Panel Overlay */
        .system-panel {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: var(--panel-bg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            margin-top: 5vh;
            border-radius: 40px 40px 0 0;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }

        /* Status Bar Simulation */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        /* Control Toggles Grid */
        .quick-settings {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 10px;
            margin-bottom: 40px;
        }

        .toggle-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: var(--icon-inactive);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: 0.2s;
            cursor: pointer;
        }

        .active .icon-circle {
            background-color: var(--icon-active);
            color: white;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-color);
        }

        /* Brightness Slider Section */
        .slider-container {
            background: rgba(0,0,0,0.05);
            padding: 20px;
            border-radius: 24px;
            margin-top: 20px;
        }

        input[type=range] {
            width: 100%;
            height: 12px;
            border-radius: 10px;
            appearance: none;
            background: #ccc;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: var(--icon-active);
            cursor: pointer;
        }

        /* Device Control Section */
        .footer-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 18px;
            border: none;
            background: rgba(0,0,0,0.05);
            font-weight: 600;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="system-panel">
        <div class="status-bar">
            <span>18:50</span>
            <span>LTE 📶 🔋 98%</span>
        </div>

        <div class="quick-settings">
            <div class="toggle-item active">
                <div class="icon-circle">📶</div>
                <span class="label">Wi-Fi</span>
            </div>
            <div class="toggle-item active">
                <div class="icon-circle">🎧</div>
                <span class="label">Bluetooth</span>
            </div>
            <div class="toggle-item">
                <div class="icon-circle">🌙</div>
                <span class="label">Mute</span>
            </div>
            <div class="toggle-item">
                <div class="icon-circle">🔄</div>
                <span class="label">Rotate</span>
            </div>
            <div class="toggle-item active">
                <div class="icon-circle">🔦</div>
                <span class="label">Flashlight</span>
            </div>
            <div class="toggle-item">
                <div class="icon-circle">✈️</div>
                <span class="label">Airplane</span>
            </div>
            <div class="toggle-item">
                <div class="icon-circle">📍</div>
                <span class="label">Location</span>
            </div>
            <div class="toggle-item">
                <div class="icon-circle">👁️</div>
                <span class="label">Eye Comfort</span>
            </div>
        </div>

        <div class="slider-container">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size: 0.8rem;">
                <span>Brightness</span>
                <span>☀️</span>
            </div>
            <input type="range" min="0" max="100" value="70">
        </div>

        <div class="footer-buttons">
            <button class="btn">Device control</button>
            <button class="btn">Media output</button>
        </div>
    </div>

</body>
</html>
